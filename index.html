<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TCAP Audit">
<link rel="manifest" href="manifest.json">
<title>TCAP IA² — AUDIT</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A0E1A;color:#E0D8F0;min-height:100vh;display:flex;flex-direction:column}
.header{background:#0A0E1A;border-bottom:2px solid #C9A84C;padding:1rem;display:flex;align-items:center;gap:0.8rem;position:sticky;top:0;z-index:100}
.header-title{font-size:1.1rem;font-weight:700;color:#FFF}
.header-sub{font-size:0.65rem;color:#C9A84C;letter-spacing:1px}
.chat-area{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.8rem;padding-bottom:180px}
.msg-user{background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);border-radius:12px 12px 0 12px;padding:0.8rem 1rem;align-self:flex-end;max-width:85%;font-size:0.9rem}
.msg-bot{background:rgba(255,255,255,0.04);border:1px solid rgba(107,70,193,0.2);border-radius:12px 12px 12px 0;padding:0.8rem 1rem;align-self:flex-start;max-width:95%;font-size:0.85rem;line-height:1.7;white-space:pre-wrap}
.msg-bot .badge{display:inline-block;background:rgba(107,70,193,0.2);border:1px solid rgba(107,70,193,0.4);border-radius:20px;padding:0.2rem 0.6rem;font-size:0.65rem;color:#A78BFA;margin-bottom:0.5rem;display:block}
.loading{display:flex;gap:4px;align-items:center;padding:0.8rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(107,70,193,0.2);border-radius:12px;align-self:flex-start}
.loading span{width:8px;height:8px;background:#C9A84C;border-radius:50%;animation:bounce 1.2s infinite}
.loading span:nth-child(2){animation-delay:0.2s}
.loading span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.input-area{background:#0A0E1A;border-top:1px solid rgba(201,168,76,0.2);padding:0.8rem;position:fixed;bottom:0;left:0;right:0;z-index:100}
.input-row{display:flex;gap:0.5rem;align-items:flex-end}
.input-text{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:12px;padding:0.7rem 1rem;color:#E0D8F0;font-size:0.9rem;resize:none;outline:none;max-height:100px;min-height:44px;font-family:'Inter',sans-serif}
.input-text::placeholder{color:#555}
.btn-send{background:linear-gradient(135deg,#C9A84C,#B8960A);border:none;border-radius:10px;width:44px;height:44px;font-size:1.2rem;cursor:pointer;flex-shrink:0}
.media-row{display:flex;gap:0.4rem;margin-top:0.5rem}
.btn-media{background:rgba(255,255,255,0.05);border:1px solid rgba(107,70,193,0.25);border-radius:8px;color:#A078C0;padding:0.4rem 0;font-size:0.72rem;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:0.2rem}
.btn-media:active{background:rgba(107,70,193,0.2)}
.btn-gravar-ativo{background:rgba(255,50,50,0.2)!important;border-color:rgba(255,50,50,0.5)!important;color:#FF6666!important}
.welcome{text-align:center;padding:2rem 1rem;background:linear-gradient(135deg,rgba(201,168,76,0.05),rgba(10,14,26,0.9));border-radius:16px;border:1px solid rgba(201,168,76,0.15);margin:0.5rem 0}
.welcome-icon{font-size:3rem;margin-bottom:0.5rem}
.welcome-name{font-size:1.3rem;font-weight:700;color:#FFF;margin-bottom:0.3rem}
.welcome-dt{font-size:0.75rem;color:#C9A84C;margin-bottom:0.8rem}
.welcome-text{font-size:0.82rem;color:#8899BB;line-height:1.7}
.quick-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:1rem}
.quick-btn{background:rgba(107,70,193,0.08);border:1px solid rgba(107,70,193,0.2);border-radius:8px;color:#C8C0D8;padding:0.6rem;font-size:0.75rem;cursor:pointer;text-align:center}
.quick-btn:active{background:rgba(107,70,193,0.25)}
.feedback-row{display:flex;gap:0.5rem;margin-top:0.5rem}
.btn-fb{background:transparent;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:0.3rem 0.8rem;color:#888;cursor:pointer;font-size:0.85rem}
.nicho-tag{display:inline-block;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:10px;padding:0.15rem 0.5rem;font-size:0.65rem;color:#C9A84C;margin-left:0.5rem}
.conf-tag{font-size:0.75rem;color:#8899BB;margin-top:0.3rem;display:block}
</style>
</head>
<body>

<div class="header">
  <div style="font-size:1.8rem">⚖️</div>
  <div>
    <div class="header-title">TCAP IA² — AUDIT</div>
    <div class="header-sub">INTELIGÊNCIA JURÍDICA ESPECIALIZADA</div>
  </div>
</div>

<div class="chat-area" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">⚖️</div>
    <div class="welcome-name" id="saudacao">Olá, Dr. Paulo!</div>
    <div class="welcome-dt" id="datetime"></div>
    <div class="welcome-text">
      Sou a <strong style="color:#E0D8F0">AUDIT</strong> — especializada em
      <strong style="color:#E0D8F0">Direito do Trabalho</strong> e
      <strong style="color:#E0D8F0">Direito Previdenciário</strong>.<br><br>
      Powered by <strong style="color:#C9A84C">TCAP IA² AbsoluteCore</strong> — Rosa dos Ventos + BERG
    </div>
    <div class="quick-btns">
      <button class="quick-btn" onclick="enviarPergunta('Como entrar com ação de horas extras?')">⚖️ Horas Extras</button>
      <button class="quick-btn" onclick="enviarPergunta('Requisitos aposentadoria rural INSS')">🌾 Aposent. Rural</button>
      <button class="quick-btn" onclick="enviarPergunta('Como reconhecer vínculo empregatício sem carteira assinada?')">🔗 Vínculo Empreg.</button>
      <button class="quick-btn" onclick="enviarPergunta('Requisitos para auxílio doença INSS')">🏥 Auxílio Doença</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea class="input-text" id="msg" placeholder="Digite sua pergunta jurídica..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();enviar()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="btn-send" onclick="enviar()">🚀</button>
  </div>
  <div class="media-row">
    <button class="btn-media" onclick="document.getElementById('upload-pdf').click()">📎 PDF</button>
    <button class="btn-media" onclick="document.getElementById('upload-foto').click()">🖼️ Foto</button>
    <button class="btn-media" id="btn-gravar" onclick="toggleGravar()">🎤 Gravar</button>
    <button class="btn-media" onclick="document.getElementById('upload-audio').click()">🔊 Áudio</button>
  </div>
  <input type="file" id="upload-pdf" accept=".pdf" style="display:none" onchange="analisarPDF(this)">
  <input type="file" id="upload-foto" accept="image/*" capture="environment" style="display:none" onchange="analisarFoto(this)">
  <input type="file" id="upload-audio" accept="audio/*,video/*" style="display:none" onchange="analisarAudio(this)">
</div>

<script>
const API = "https://tcap-api.onrender.com";
const chat = document.getElementById("chat");
let mediaRecorder = null, chunks = [], gravando = false;

// Hora
function atualizar(){
  const n = new Date();
  const h = n.getHours();
  const s = h<12?"Bom dia":h<18?"Boa tarde":"Boa noite";
  document.getElementById("saudacao").textContent = `${s}, Dr. Paulo!`;
  document.getElementById("datetime").textContent = `📅 ${n.toLocaleDateString("pt-BR")} — ${n.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`;
}
atualizar();
setInterval(atualizar,60000);

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

function esconderWelcome(){
  const w = document.getElementById("welcome");
  if(w) w.style.display="none";
}

function addMsg(texto, tipo, nicho="", confianca=""){
  esconderWelcome();
  const div = document.createElement("div");
  div.className = tipo==="user" ? "msg-user" : "msg-bot";
  if(tipo==="bot"){
    const badge = document.createElement("span");
    badge.className = "badge";
    badge.innerHTML = `⚛️ AUDIT — TCAP IA² AbsoluteCore${nicho?`<span class="nicho-tag">${nicho}</span>`:""}`;
    div.appendChild(badge);
    const txt = document.createElement("div");
    txt.textContent = texto;
    div.appendChild(txt);
    if(confianca){
      const conf = document.createElement("span");
      conf.className = "conf-tag";
      conf.textContent = `🔍 Confiança: ${confianca}`;
      div.appendChild(conf);
    }
    const fb = document.createElement("div");
    fb.className = "feedback-row";
    fb.innerHTML = `<button class="btn-fb" onclick="this.parentElement.innerHTML='✅ Obrigado!'">👍</button><button class="btn-fb" onclick="this.parentElement.innerHTML='📋 Anotado!'">👎</button>`;
    div.appendChild(fb);
  } else {
    div.textContent = texto;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addLoading(){
  esconderWelcome();
  const div = document.createElement("div");
  div.className = "loading";
  div.id = "loading";
  div.innerHTML = "<span></span><span></span><span></span><span style="margin-left:8px;font-size:0.75rem;color:#8899BB" id="loading-txt">⚛️ Consultando Rosa dos Ventos...</span>";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeLoading(){
  const l = document.getElementById("loading");
  if(l) l.remove();
}

async function chamarAPI(pergunta){
  addLoading();
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 90000);
    const resp = await fetch(`${API}/perguntar`, {
      signal: controller.signal,
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({pergunta, cliente_nome:"Dr. Paulo Miguel Arantes"})
    });
    removeLoading();
    clearTimeout(timer);
    if(!resp.ok) throw new Error("API error");
    const data = await resp.json();
    addMsg(data.resposta, "bot", data.nicho, data.confianca);
  } catch(e) {
    removeLoading();
    addMsg("⚠️ API demorando para responder. Digite a pergunta novamente — o sistema já está acordado!", "bot");
    console.error(e);
  }
}

function enviar(){
  const msg = document.getElementById("msg").value.trim();
  if(!msg) return;
  addMsg(msg, "user");
  document.getElementById("msg").value = "";
  document.getElementById("msg").style.height = "auto";
  chamarAPI(msg);
}

function enviarPergunta(texto){
  addMsg(texto, "user");
  chamarAPI(texto);
}

// Gravar áudio
async function toggleGravar(){
  const btn = document.getElementById("btn-gravar");
  if(!gravando){
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];
      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t=>t.stop());
        addMsg("🎤 Áudio gravado — análise jurídica em processamento...", "user");
        chamarAPI("Transcreva e analise juridicamente este áudio gravado pelo advogado");
      };
      mediaRecorder.start();
      gravando = true;
      btn.textContent = "⏹️ Parar";
      btn.classList.add("btn-gravar-ativo");
    } catch(e){
      alert("Permita acesso ao microfone nas configurações do navegador.");
    }
  } else {
    mediaRecorder.stop();
    gravando = false;
    btn.textContent = "🎤 Gravar";
    btn.classList.remove("btn-gravar-ativo");
  }
}

function analisarPDF(input){
  if(!input.files[0]) return;
  const nome = input.files[0].name;
  addMsg(`📎 PDF enviado: ${nome}`, "user");
  chamarAPI(`Faça uma análise jurídica completa e detalhada deste documento PDF: ${nome}. Identifique o tipo, pontos críticos, base legal, prazos, riscos e próximos passos.`);
}

function analisarFoto(input){
  if(!input.files[0]) return;
  addMsg(`🖼️ Imagem enviada para análise jurídica`, "user");
  chamarAPI("Analise juridicamente esta imagem — pode ser um documento, contrato, notificação, laudo médico ou qualquer documento jurídico. Identifique o conteúdo e oriente o advogado.");
}

function analisarAudio(input){
  if(!input.files[0]) return;
  addMsg(`🔊 Áudio enviado: ${input.files[0].name}`, "user");
  chamarAPI("Transcreva e analise juridicamente este áudio. Identifique os principais pontos jurídicos mencionados e oriente o advogado.");
}
</script>
</body>
</html>
